{{ define "main" }}
<section class="page-hero">
  <div class="container">
    {{ with .Params.eyebrow }}<div class="eyebrow">{{ . }}</div>{{ end }}
    <h1>{{ .Title }}</h1>
  </div>
</section>
<section class="section">
  <div class="container prose">
    {{ .Content }}
    {{ with .Pages }}
    <div class="grid grid-2" style="margin-top:24px;">
      {{ range . }}
      <a class="card" href="{{ .RelPermalink }}" style="text-decoration:none;color:inherit;">
        <h3>{{ .Title }}</h3>
        <p class="card-summary">{{ .Params.summary | default (.Summary | plainify) | truncate 140 }}</p>
      </a>
      {{ end }}
    </div>
    {{ end }}
  </div>
</section>
{{ end }}
