{{ define "main" }}
<section class="page-hero">
  <div class="container">
    <div class="eyebrow">Browse</div>
    <h1>{{ .Title }}</h1>
  </div>
</section>
<section class="section">
  <div class="container">
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      {{ range .Pages }}
      <a class="badge badge-type" style="font-size:.9rem;padding:6px 14px;" href="{{ .RelPermalink }}">{{ .Title }} ({{ len .Pages }})</a>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
